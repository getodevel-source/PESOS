name: Release App

on:
  push:
    tags:
      - 'v*' # Se ejecuta automáticamente cuando creas un tag (ej. v1.0.2)

jobs:
  build:
    # Matrix: Linux (AppImage + DEB), macOS (zip), Windows (NSIS .exe).
    # electron-builder is OS-aware — the `npm run build:electron`
    # command reads the runner OS and produces the right artifact
    # without platform flags. Each job publishes to the same
    # GitHub Release, so a single tag produces installers for all
    # three platforms.
    strategy:
      fail-fast: false
      matrix:
        # macOS builds for both Apple Silicon (macos-14) and Intel
        # (macos-13). Each runner builds the zip for its own arch, so
        # a single tag produces BOTH `*-arm64-mac.zip` and `*-x64-mac.zip`
        # assets in the GitHub Release. electron-builder reads the
        # runner's arch automatically — no `arch` flag needed.
        os: [ubuntu-latest, macos-14, macos-13, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Verify mock ↔ schema sync
        # Catches drift between src/lib/sqlite-db.ts (the SQLite
        # schema) and the MockDatabase type in supabase.ts. Runs in
        # < 1s. Fails the release if a new table was added to one
        # but not the other.
        run: bash scripts/check-mock-schema-sync.sh

      - name: Build Next.js & Electron (${{ matrix.os }})
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # electron-builder picks the artifact type from the runner OS:
        # Linux -> AppImage + DEB, macOS -> zip, Windows -> NSIS .exe
        run: npm run build:electron -- --publish always
