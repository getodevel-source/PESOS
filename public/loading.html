<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PESOS</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #080b14;
    overflow: hidden;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  /* Animated background grid */
  .grid {
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridPan 8s linear infinite;
  }
  @keyframes gridPan {
    0%   { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Glowing orbs */
  .orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.15;
    animation: orb-drift 6s ease-in-out infinite alternate;
  }
  .orb-1 {
    width: 500px; height: 500px;
    background: radial-gradient(circle, #00ff88, transparent 70%);
    top: -100px; left: -100px;
    animation-duration: 7s;
  }
  .orb-2 {
    width: 400px; height: 400px;
    background: radial-gradient(circle, #6366f1, transparent 70%);
    bottom: -80px; right: -80px;
    animation-duration: 9s;
    animation-delay: -3s;
  }
  .orb-3 {
    width: 300px; height: 300px;
    background: radial-gradient(circle, #0ea5e9, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation-duration: 5s;
    animation-delay: -1.5s;
  }
  @keyframes orb-drift {
    0%   { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, 20px) scale(1.1); }
  }

  /* Main container */
  .container {
    position: relative; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; gap: 32px;
  }

  /* Logo mark */
  .logo-wrap {
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .logo-ring {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 1.5px solid rgba(0,255,136,0.3);
    animation: spin 4s linear infinite;
  }
  .logo-ring::before {
    content: '';
    position: absolute; top: -2px; left: 50%;
    width: 6px; height: 6px; border-radius: 50%;
    background: #00ff88;
    box-shadow: 0 0 12px #00ff88, 0 0 24px #00ff88;
    transform: translateX(-50%);
  }
  .logo-ring-2 {
    width: 90px; height: 90px;
    border-color: rgba(99,102,241,0.3);
    animation: spin 3s linear infinite reverse;
  }
  .logo-ring-2::before {
    background: #6366f1;
    box-shadow: 0 0 12px #6366f1, 0 0 24px #6366f1;
  }
  @keyframes spin {
    0%   { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  .logo-symbol {
    font-size: 36px; font-weight: 800;
    background: linear-gradient(135deg, #00ff88, #6366f1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: -1px;
    animation: pulse-glow 2s ease-in-out infinite alternate;
  }
  @keyframes pulse-glow {
    0%   { filter: drop-shadow(0 0 8px rgba(0,255,136,0.5)); }
    100% { filter: drop-shadow(0 0 20px rgba(99,102,241,0.7)); }
  }

  /* Title */
  .title {
    font-size: 28px; font-weight: 700; letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.9);
    animation: fade-in 0.8s ease forwards;
  }
  .subtitle {
    font-size: 12px; letter-spacing: 3px;
    color: rgba(0,255,136,0.6);
    text-transform: uppercase;
    margin-top: -20px;
    animation: fade-in 1s ease 0.3s both;
  }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Progress bar */
  .progress-wrap {
    width: 280px;
    animation: fade-in 1s ease 0.6s both;
  }
  .progress-bar {
    width: 100%; height: 2px;
    background: rgba(255,255,255,0.08);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #6366f1, #0ea5e9);
    background-size: 200% 100%;
    animation: progress-scan 1.8s ease-in-out infinite, bg-shift 3s linear infinite;
    border-radius: 2px;
  }
  @keyframes progress-scan {
    0%   { width: 0%; margin-left: 0%; }
    50%  { width: 60%; margin-left: 20%; }
    100% { width: 0%; margin-left: 100%; }
  }
  @keyframes bg-shift {
    0%   { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  /* Status dots */
  .status-dots {
    display: flex; gap: 6px; align-items: center;
    margin-top: 10px; justify-content: center;
  }
  .dot {
    width: 4px; height: 4px; border-radius: 50%;
    background: rgba(0,255,136,0.4);
    animation: dot-pulse 1.4s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes dot-pulse {
    0%, 100% { transform: scale(1); opacity: 0.4; }
    50%       { transform: scale(1.5); opacity: 1; background: #00ff88; box-shadow: 0 0 8px #00ff88; }
  }

  /* Status text */
  .status-text {
    font-size: 11px; letter-spacing: 2px; color: rgba(255,255,255,0.3);
    text-transform: uppercase;
    animation: fade-in 1s ease 1s both;
  }
</style>
</head>
<body>

<div class="grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="container">
  <div class="logo-wrap">
    <div class="logo-ring"></div>
    <div class="logo-ring logo-ring-2"></div>
    <span class="logo-symbol">$</span>
  </div>

  <div style="text-align:center; display:flex; flex-direction:column; gap:8px;">
    <div class="title">PESOS</div>
    <div class="subtitle">Personal Operating System</div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
    <div class="status-dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>

  <div class="status-text">Iniciando sistema</div>
</div>

</body>
</html>
